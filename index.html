<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gossip! Bookings</title>
  <link rel="manifest" href="/gossipbookings/manifest.json" />
  <meta name="theme-color" content="#1a1a1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Gossip!" />
  <link rel="apple-touch-icon" href="/gossipbookings/icon-192.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; font-size: 14px; line-height: 1.5; }
    :root {
      --coral: #F05A35; --coral-dark: #d94a27; --coral-light: #FEE8E2;
      --coral-pale: #FEF5F2; --coral-mid: #F9B49E; --black: #1a1a1a;
      --header-bg: #1a1a1a; --white: #ffffff; --gray-50: #fafafa;
      --gray-100: #f5f5f5; --gray-200: #ebebeb; --gray-300: #e0e0e0;
      --gray-400: #bbb; --gray-500: #aaa; --gray-600: #888;
      --gray-700: #555; --gray-800: #333; --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px;
    }
    input,select,textarea,button{font-family:inherit;font-size:14px;}
    input,select,textarea{border:1px solid var(--gray-300);border-radius:var(--radius-md);padding:8px 10px;background:var(--white);color:var(--black);width:100%;transition:border-color .15s,box-shadow .15s;}
    input:focus,select:focus,textarea:focus{outline:none;border-color:var(--coral);box-shadow:0 0 0 3px rgba(240,90,53,.12);}
    input::placeholder,textarea::placeholder{color:var(--gray-400);}
    input:disabled,select:disabled,textarea:disabled{background:var(--gray-100);color:var(--gray-700);cursor:not-allowed;}
    button{cursor:pointer;border:none;border-radius:var(--radius-md);padding:7px 16px;font-weight:500;transition:background .15s,transform .1s,opacity .15s;}
    button:active{transform:scale(.97);}
    .btn-coral{background:var(--coral);color:#fff;} .btn-coral:hover{background:var(--coral-dark);} .btn-coral:disabled{opacity:.45;cursor:not-allowed;transform:none;}
    .btn-ghost{background:var(--gray-100);color:var(--gray-700);border:1px solid var(--gray-300);} .btn-ghost:hover{background:var(--gray-200);color:var(--black);}
    .btn-edit{background:var(--gray-100);color:var(--gray-700);border:1px solid var(--gray-200);font-size:12px;padding:4px 12px;} .btn-edit:hover{background:var(--gray-200);}
    .btn-del{background:var(--coral-light);color:#C03A1A;border:1px solid var(--coral-mid);font-size:12px;padding:4px 12px;} .btn-del:hover{background:#fdd5c8;}
    .btn-nav{background:var(--coral-light);color:#C03A1A;border:1px solid var(--coral-mid);padding:6px 14px;font-size:18px;line-height:1;border-radius:var(--radius-md);} .btn-nav:hover{background:var(--coral-mid);}
    .btn-close{background:var(--gray-100);color:var(--gray-600);border:1px solid var(--gray-200);padding:3px 9px;font-size:15px;} .btn-close:hover{background:var(--gray-200);}
    .btn-green{background:#1D9E75;color:#fff;} .btn-green:hover{background:#0F6E56;}

    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--gray-100);padding:1rem;}
    .login-card{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--gray-200);padding:2rem;width:380px;max-width:100%;}
    .login-title{font-size:16px;font-weight:600;color:var(--gray-700);margin-bottom:1.25rem;}
    .error-msg{background:var(--coral-light);color:#C03A1A;border:1px solid var(--coral-mid);border-radius:var(--radius-md);padding:8px 12px;font-size:13px;margin-bottom:12px;}
    .success-msg{background:#EAF7F2;color:#0F6E56;border:1px solid #9FE1CB;border-radius:var(--radius-md);padding:8px 12px;font-size:13px;margin-bottom:12px;}
    .brand-header{background:var(--header-bg);border-radius:var(--radius-md);padding:14px 18px;margin-bottom:1.5rem;text-align:center;}
    .brand-name{font-size:32px;font-weight:900;color:var(--coral);text-transform:uppercase;letter-spacing:-.01em;line-height:1;}
    .brand-sub{font-size:9px;color:#888;letter-spacing:.18em;text-transform:uppercase;margin-top:3px;}

    .app-header{background:var(--header-bg);position:sticky;top:0;z-index:50;}
    .header-inner{max-width:1300px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:14px;}
    .brand-lockup .brand-name{font-size:22px;} .brand-lockup .brand-sub{margin-top:1px;}
    .header-divider{width:1px;height:34px;background:#333;}
    .header-label{font-size:13px;color:#ccc;font-weight:500;letter-spacing:.03em;}
    .header-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .role-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:var(--coral);color:#fff;letter-spacing:.04em;text-transform:uppercase;}
    .user-email{font-size:12px;color:#888;}

    .app-main{max-width:1300px;margin:0 auto;padding:1.5rem 20px 3rem;}
    .app-body{display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start;}
    .main-col{min-width:0;}
    .sidebar{display:flex;flex-direction:column;gap:16px;}
    .sidebar-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-lg);overflow:hidden;}
    .sidebar-card-header{background:var(--black);padding:10px 14px;}
    .sidebar-card-title{font-size:11px;font-weight:700;color:var(--coral);text-transform:uppercase;letter-spacing:.1em;}

    .today-date-block{padding:14px;border-bottom:1px solid var(--gray-100);}
    .today-day-name{font-size:11px;color:var(--gray-500);font-weight:500;text-transform:uppercase;letter-spacing:.06em;}
    .today-date-num{font-size:48px;font-weight:900;color:var(--coral);line-height:1;margin:2px 0;}
    .today-month-year{font-size:13px;color:var(--gray-700);font-weight:500;}
    .today-count-bar{display:flex;gap:8px;padding:10px 14px;background:var(--gray-50);border-bottom:1px solid var(--gray-100);}
    .count-chip{flex:1;text-align:center;background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-md);padding:6px 4px;}
    .count-num{font-size:20px;font-weight:800;color:var(--coral);line-height:1;}
    .count-lbl{font-size:10px;color:var(--gray-500);margin-top:2px;text-transform:uppercase;letter-spacing:.04em;}
    .today-bookings-list{padding:0 14px 8px;}
    .today-booking-item{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--gray-100);cursor:pointer;}
    .today-booking-item:last-child{border-bottom:none;}
    .today-booking-item:hover .today-booking-name{color:var(--coral);}
    .today-dot{width:7px;height:7px;border-radius:50%;margin-top:4px;flex-shrink:0;}
    .dot-tbl{background:var(--coral);} .dot-pvt{background:#aaa;}
    .today-booking-name{font-size:13px;font-weight:600;color:var(--black);}
    .today-booking-meta{font-size:11px;color:var(--gray-500);margin-top:1px;}
    .today-time{font-size:11px;font-weight:700;color:var(--coral);white-space:nowrap;margin-top:2px;}
    .today-empty{padding:16px 14px;font-size:13px;color:var(--gray-400);text-align:center;}

    .notes-body{padding:12px 14px;}
    .note-item{background:#FFFBF0;border:1px solid #FAC775;border-radius:var(--radius-md);padding:8px 10px;margin-bottom:8px;position:relative;}
    .note-item:last-child{margin-bottom:8px;}
    .note-author{font-size:10px;font-weight:700;color:#854F0B;text-transform:uppercase;letter-spacing:.04em;}
    .note-time{font-size:10px;color:#BA7517;margin-left:6px;}
    .note-text{font-size:13px;color:#412402;margin-top:3px;line-height:1.4;word-break:break-word;}
    .note-del-btn{position:absolute;top:6px;right:6px;background:none;border:none;color:#BA7517;font-size:13px;padding:0 3px;cursor:pointer;opacity:.5;}
    .note-del-btn:hover{opacity:1;}
    .note-input-row{display:flex;gap:6px;margin-top:8px;}
    .note-input-row textarea{font-size:13px;padding:7px 9px;resize:none;border-radius:var(--radius-md);}
    .notes-empty{font-size:13px;color:var(--gray-400);text-align:center;padding:8px 0 4px;}

    .action-bar{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gray-200);margin-bottom:1.25rem;flex-wrap:wrap;gap:8px;}
    .tabs{display:flex;}
    .tab-btn{padding:9px 18px;font-size:13px;border:none;background:transparent;color:var(--gray-500);cursor:pointer;border-bottom:3px solid transparent;font-weight:500;border-radius:0;transition:color .15s;}
    .tab-btn.active{color:var(--coral);border-bottom-color:var(--coral);}
    .tab-btn:hover:not(.active){color:var(--black);}
    .action-right{display:flex;align-items:center;gap:8px;padding-bottom:6px;flex-wrap:wrap;}
    .action-right select{width:auto;}

    .cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
    .month-label{font-size:17px;font-weight:600;min-width:160px;text-align:center;color:var(--black);}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
    .cal-header-cell{font-size:11px;color:#fff;text-align:center;padding:6px 0;font-weight:700;background:var(--coral);border-radius:4px;letter-spacing:.04em;text-transform:uppercase;margin-bottom:2px;}
    .cal-day{min-height:82px;border:1px solid var(--gray-200);border-radius:var(--radius-sm);padding:5px;cursor:pointer;background:var(--white);transition:border-color .15s,background .15s;}
    .cal-day:hover{border-color:var(--coral);background:var(--coral-pale);}
    .cal-day.other-month{background:var(--gray-50);opacity:.45;pointer-events:none;}
    .cal-day.today{border:2px solid var(--coral);}
    .cal-day.selected{background:var(--coral-pale);border-color:var(--coral);}
    .day-num{font-size:11px;color:var(--gray-500);font-weight:500;margin-bottom:3px;}
    .cal-day.today .day-num{color:var(--coral);font-weight:700;}
    .cal-event{font-size:10px;padding:2px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;font-weight:600;}
    .ev-table{background:var(--coral-light);color:#C03A1A;border-left:2px solid var(--coral);}
    .ev-private{background:#f0f0f0;color:#555;border-left:2px solid #aaa;}
    .cal-more{font-size:9px;color:var(--gray-400);margin-top:1px;}
    .cal-legend{display:flex;gap:16px;margin-top:12px;}
    .legend-item{font-size:12px;color:var(--gray-600);display:flex;align-items:center;gap:5px;}
    .legend-dot{width:10px;height:10px;border-radius:2px;display:inline-block;}
    .dot-table{background:var(--coral);} .dot-private{background:#ccc;}

    .list-container{border:1px solid var(--gray-200);border-radius:var(--radius-lg);background:var(--white);overflow:hidden;}
    .list-row{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--gray-100);transition:background .1s;}
    .list-row:last-child{border-bottom:none;} .list-row:hover{background:var(--gray-50);}
    .list-info{flex:1;min-width:0;}
    .list-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .list-meta{font-size:12px;color:var(--gray-600);margin-top:2px;}
    .list-extra{font-size:11px;color:var(--gray-400);margin-top:1px;}
    .list-empty{text-align:center;padding:3rem;color:var(--gray-400);font-size:14px;}

    .badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap;letter-spacing:.02em;}
    .badge-table{background:var(--coral-light);color:#C03A1A;border:1px solid var(--coral-mid);}
    .badge-private{background:#f0f0f0;color:#555;border:1px solid #ddd;}
    .badge-admin{background:#1a1a1a;color:var(--coral);border:1px solid #333;}
    .badge-manager{background:#EAF3DE;color:#27500A;border:1px solid #C0DD97;}
    .badge-staff{background:var(--gray-100);color:var(--gray-700);border:1px solid var(--gray-300);}

    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:flex-start;justify-content:center;z-index:200;padding:2rem 1rem;overflow-y:auto;}
    .modal{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--gray-200);padding:1.5rem;width:580px;max-width:100%;margin:auto;}
    .modal-header{display:flex;align-items:center;margin-bottom:1.25rem;padding-bottom:12px;border-bottom:1px solid var(--gray-100);}
    .modal-title{font-size:15px;font-weight:700;color:var(--coral);text-transform:uppercase;letter-spacing:.05em;}
    .modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:12px;border-top:1px solid var(--gray-100);}
    .sec{font-size:10px;font-weight:700;color:var(--coral);margin:16px 0 8px;text-transform:uppercase;letter-spacing:.1em;border-bottom:1px solid #F9D4C8;padding-bottom:5px;}
    .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
    .field-row.single{grid-template-columns:1fr;} .field-row.triple{grid-template-columns:1fr 1fr 1fr;}
    label.fl{font-size:12px;color:var(--gray-600);display:block;margin-bottom:4px;}
    .toggle-group{display:flex;border:1px solid var(--gray-300);border-radius:var(--radius-md);overflow:hidden;}
    .toggle-btn{flex:1;border:none;padding:8px 0;font-size:13px;background:var(--gray-100);color:var(--gray-500);cursor:pointer;transition:background .15s;font-weight:400;border-radius:0;}
    .toggle-btn.on{background:var(--coral);color:#fff;font-weight:600;}
    .toggle-btn.on-yes{background:#1D9E75;color:#fff;font-weight:600;}
    .toggle-btn.on-no{background:var(--gray-300);color:#666;font-weight:500;}
    .menu-note-box{border:1px solid var(--coral-mid);border-radius:var(--radius-md);background:var(--coral-pale);padding:10px;margin-top:8px;margin-bottom:12px;}
    .menu-note-box textarea{background:#fff8f5;border-color:var(--coral-mid);}
    .conflict-warn{background:#FEF0E8;color:#B84020;border:1px solid var(--coral-mid);border-radius:var(--radius-md);padding:8px 12px;font-size:12px;margin-bottom:12px;}

    .user-table{width:100%;border-collapse:collapse;margin-top:4px;}
    .user-table th{font-size:11px;font-weight:700;color:var(--gray-600);text-transform:uppercase;letter-spacing:.05em;padding:6px 10px;border-bottom:1px solid var(--gray-200);text-align:left;}
    .user-table td{padding:9px 10px;border-bottom:1px solid var(--gray-100);font-size:13px;vertical-align:middle;}
    .user-table tr:last-child td{border-bottom:none;}
    .user-table tr:hover td{background:var(--gray-50);}

    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--black);color:#fff;padding:10px 22px;border-radius:30px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity .3s;white-space:nowrap;pointer-events:none;}
    .toast.show{opacity:1;}
    .spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(240,90,53,.25);border-top-color:var(--coral);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
    @keyframes spin{to{transform:rotate(360deg);}}

    @media(max-width:900px){.app-body{grid-template-columns:1fr;}.sidebar{display:grid;grid-template-columns:1fr 1fr;gap:12px;}}
    @media(max-width:640px){.field-row{grid-template-columns:1fr;}.field-row.triple{grid-template-columns:1fr 1fr;}.cal-event{font-size:9px;}.cal-day{min-height:56px;}.header-inner{flex-wrap:wrap;gap:8px;}.user-email{display:none;}.sidebar{grid-template-columns:1fr;}}
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen" class="login-wrap">
    <div class="login-card">
      <div class="brand-header">
        <div class="brand-name">GOSSIP</div>
        <div class="brand-sub">Artisan Bakery &amp; Cafe</div>
      </div>
      <div class="login-title">Sign in to Bookings</div>
      <div id="login-error" class="error-msg" style="display:none"></div>
      <label class="fl">Email</label>
      <input type="email" id="login-email" placeholder="you@example.com" />
      <label class="fl" style="margin-top:12px">Password</label>
      <input type="password" id="login-password" placeholder="••••••••" />
      <button class="btn-coral" id="login-btn" style="width:100%;margin-top:20px;padding:10px">Sign in</button>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="main-app" style="display:none">
    <header class="app-header">
      <div class="header-inner">
        <div class="brand-lockup">
          <div class="brand-name">GOSSIP</div>
          <div class="brand-sub">Artisan Bakery &amp; Cafe</div>
        </div>
        <div class="header-divider"></div>
        <div class="header-label">Bookings</div>
        <div class="header-right">
          <span id="user-role-badge" class="role-badge"></span>
          <span id="user-email-display" class="user-email"></span>
          <button id="manage-users-btn" class="btn-ghost" style="padding:5px 12px;font-size:13px;display:none">Manage users</button>
          <button class="btn-ghost" id="logout-btn" style="padding:5px 12px;font-size:13px;background:rgba(255,255,255,0.1);color:#ccc;border-color:#444">Sign out</button>
        </div>
      </div>
    </header>

    <main class="app-main">
      <div class="action-bar">
        <div class="tabs">
          <button class="tab-btn active" data-view="calendar">Calendar</button>
          <button class="tab-btn" data-view="list">List view</button>
        </div>
        <div class="action-right">
          <div id="list-filter" style="display:none">
            <select id="filter-type">
              <option value="All">All types</option>
              <option value="Table Booking">Table Booking</option>
              <option value="Private Area">Private Area</option>
            </select>
          </div>
          <button class="btn-coral" id="new-btn">+ New booking</button>
        </div>
      </div>

      <div class="app-body">
        <!-- MAIN COLUMN -->
        <div class="main-col">
          <div id="view-calendar">
            <div class="cal-nav">
              <button class="btn-nav" id="prev-m">&#8249;</button>
              <span id="cal-month-label" class="month-label"></span>
              <button class="btn-nav" id="next-m">&#8250;</button>
            </div>
            <div class="cal-grid" id="cal-headers"></div>
            <div class="cal-grid" id="cal-cells"></div>
            <div class="cal-legend">
              <span class="legend-item"><span class="legend-dot dot-table"></span>Table booking</span>
              <span class="legend-item"><span class="legend-dot dot-private"></span>Private area</span>
            </div>
          </div>
          <div id="view-list" style="display:none">
            <div id="list-container"></div>
          </div>
        </div>

        <!-- SIDEBAR -->
        <div class="sidebar">

          <!-- TODAY CARD -->
          <div class="sidebar-card">
            <div class="sidebar-card-header">
              <span class="sidebar-card-title">Today</span>
            </div>
            <div class="today-date-block">
              <div class="today-day-name" id="today-day-name"></div>
              <div class="today-date-num" id="today-date-num"></div>
              <div class="today-month-year" id="today-month-year"></div>
            </div>
            <div class="today-count-bar">
              <div class="count-chip"><div class="count-num" id="today-total">0</div><div class="count-lbl">Total</div></div>
              <div class="count-chip"><div class="count-num" id="today-tables">0</div><div class="count-lbl">Tables</div></div>
              <div class="count-chip"><div class="count-num" id="today-pvt">0</div><div class="count-lbl">Private</div></div>
            </div>
            <div id="today-bookings-list" class="today-bookings-list"></div>
          </div>

          <!-- TEAM NOTES -->
          <div class="sidebar-card">
            <div class="sidebar-card-header">
              <span class="sidebar-card-title">Team notes</span>
            </div>
            <div class="notes-body">
              <div id="notes-list"></div>
              <div class="note-input-row">
                <textarea id="note-input" rows="2" placeholder="Add a note for the team…"></textarea>
                <button class="btn-coral" id="note-submit-btn" style="padding:7px 12px;white-space:nowrap;align-self:flex-end">Post</button>
              </div>
            </div>
          </div>

        </div>
      </div>
    </main>
  </div>

  <!-- MODAL -->
  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <span id="modal-title" class="modal-title"></span>
        <button class="btn-close" id="modal-close">&#x2715;</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <div id="toast" class="toast" style="display:none"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, setDoc, onSnapshot, query, orderBy, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging.js";

    // ── REPLACE WITH YOUR FIREBASE CONFIG ──────────────────────
    const firebaseConfig = {
      apiKey:            "AIzaSyAITydT4tYzjOyP3m995_WHh188omR8drU",
      authDomain:        "gossipbookings.firebaseapp.com",
      projectId:         "gossipbookings",
      storageBucket:     "gossipbookings.firebasestorage.app",

    };
    // ───────────────────────────────────────────────────────────

    const fbApp = initializeApp(firebaseConfig);
    const auth  = getAuth(fbApp);

    const messaging = getMessaging(fbApp);

    // ── FCM: Register device token ─────────────────────────
    // REPLACE with your VAPID key from Firebase Console
    // (Project Settings → Cloud Messaging → Web Push certificates → Key pair)
    const VAPID_KEY = "REPLACE_WITH_YOUR_VAPID_KEY";

    async function registerFCMToken() {
      try {
        const token = await getToken(messaging, {
          vapidKey: VAPID_KEY,
          serviceWorkerRegistration: await navigator.serviceWorker.getRegistration('/gossipbookings/sw.js')
        });
        if (token) {
          // Save token to Firestore so Cloud Function can find it
          await setDoc(doc(db, 'fcmTokens', token), {
            token,
            userId: auth.currentUser?.uid,
            userEmail: auth.currentUser?.email,
            updatedAt: new Date().toISOString()
          });
          console.log('FCM token registered');
        }
      } catch (err) {
        console.warn('FCM token registration failed:', err);
      }
    }

    // Show in-app notification banner when app is in foreground
    onMessage(messaging, (payload) => {
      const { title, body } = payload.notification || {};
      if (title || body) showToast(`${title}: ${body}`, 6000);
    });

    const BOOKING_TYPES = ['Table Booking','Private Area'];
    const EVENT_TYPES   = ['Birthday','Kitty','Meeting','Private Dinner'];
    const ROLES         = {admin:'Admin',manager:'Manager',staff:'Staff'};

    let state = {
      user:null, userRole:null, bookings:[], notes:[], users:[],
      view:'calendar', month:new Date().getMonth(), year:new Date().getFullYear(),
      selectedDate:null, modalMode:null, editBookingId:null, formData:{},
      unsubBookings:null, unsubNotes:null, unsubUsers:null,
    };

    // ── UTILS ──
    const pad   = n => String(n).padStart(2,'0');
    const todayStr = () => { const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
    const esc   = s => String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    function showToast(msg,dur=2500){
      const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; t.classList.add('show');
      setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.style.display='none',300);},dur);
    }
    function checkConflict(f,excludeId=null){
      if(f.type!=='Private Area') return false;
      return state.bookings.some(b=>{
        if(b.type!=='Private Area'||b.date!==f.date) return false;
        if(excludeId&&b.id===excludeId) return false;
        return f.fromTime<(b.toTime||'23:59')&&(f.toTime||'23:59')>b.fromTime;
      });
    }
    function fmtTimestamp(ts){
      if(!ts) return '';
      const d=ts.toDate?ts.toDate():new Date(ts);
      return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
    }

    // ── AUTH ──
    document.getElementById('login-btn').addEventListener('click', async()=>{
      const email=document.getElementById('login-email').value.trim();
      const pass=document.getElementById('login-password').value;
      const errEl=document.getElementById('login-error');
      const btn=document.getElementById('login-btn');

      btn.innerHTML='<span class="spinner"></span>Signing in…'; btn.disabled=true;

        document.getElementById('login-screen').style.display='none';
        document.getElementById('main-app').style.display='block';

    // ── LISTENERS ──
    function startListeners(){
      if(state.unsubBookings) state.unsubBookings();
      state.unsubBookings=onSnapshot(query(collection(db,'bookings'),orderBy('date'),orderBy('fromTime')), snap=>{
        state.bookings=snap.docs.map(d=>({id:d.id,...d.data()}));
        if(state.view==='calendar') renderCalendar(); else renderList();
        renderTodayPanel();
        document.dispatchEvent(new CustomEvent('gossip:bookings-updated', { detail: state.bookings }));
      }, err=>{ console.error(err); showToast('Error loading bookings.'); });

      if(state.unsubNotes) state.unsubNotes();
      state.unsubNotes=onSnapshot(query(collection(db,'notes'),orderBy('createdAt','desc')), snap=>{

    // ── TODAY PANEL ──
    function renderTodayPanel(){
      const now=new Date();
      const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
      document.getElementById('today-day-name').textContent=DAYS[now.getDay()];
      document.getElementById('today-date-num').textContent=now.getDate();

      const td=todayStr();
      const tbks=[...state.bookings.filter(b=>b.date===td)].sort((a,b)=>a.fromTime.localeCompare(b.fromTime));
      document.getElementById('today-total').textContent=tbks.length;
      document.getElementById('today-tables').textContent=tbks.filter(b=>b.type==='Table Booking').length;
      document.getElementById('today-pvt').textContent=tbks.filter(b=>b.type==='Private Area').length;

      if(!tbks.length){ list.innerHTML='<div class="today-empty">No bookings today</div>'; return; }
      list.innerHTML=tbks.map(b=>`
        <div class="today-booking-item" data-id="${b.id}">
          <span class="today-dot ${b.type==='Private Area'?'dot-pvt':'dot-tbl'}"></span>

            <div class="today-booking-name">${esc(b.name)}</div>
            <div class="today-booking-meta">${b.fromTime}–${b.toTime} · ${b.guests} guests · ${esc(b.event)}</div>
          </div>
          <div class="today-time">${b.fromTime}</div>
        </div>`).join('');
      list.querySelectorAll('.today-booking-item').forEach(el=>el.addEventListener('click',()=>openViewModal(el.dataset.id)));

    // ── TEAM NOTES ──
    function renderNotes(){
      const list=document.getElementById('notes-list');
      if(!list) return;
      if(!state.notes.length){ list.innerHTML='<div class="notes-empty">No notes yet</div>'; return; }
      list.innerHTML=state.notes.slice(0,15).map(n=>`

    document.getElementById('note-submit-btn').addEventListener('click',async()=>{

    document.getElementById('note-input').addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();document.getElementById('note-submit-btn').click();} });

    // ── TABS ──
    document.querySelectorAll('.tab-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{

    // ── CALENDAR ──
    function renderCalendar(){
      const {month,year}=state;
      document.getElementById('cal-month-label').textContent=`${new Date(year,month,1).toLocaleString('default',{month:'long'})} ${year}`;
      const hdrs=document.getElementById('cal-headers'); hdrs.innerHTML='';
      ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>{ const el=document.createElement('div'); el.className='cal-header-cell'; el.textContent=d; hdrs.appendChild(el); });
      const cells=document.getElementById('cal-cells'); cells.innerHTML='';
      const first=new Date(year,month,1).getDay(), dim=new Date(year,month+1,0).getDate();
      const diPrev=new Date(year,month,0).getDate(), td=todayStr();
      let all=[];
      for(let i=first-1;i>=0;i--) all.push({day:diPrev-i,cur:false});
      for(let i=1;i<=dim;i++) all.push({day:i,cur:true});
      while(all.length%7!==0) all.push({day:all.length-first-dim+1,cur:false});
      all.forEach(c=>{
        const ds=c.cur?`${year}-${pad(month+1)}-${pad(c.day)}`:'';
        const bks=ds?state.bookings.filter(b=>b.date===ds):[];
        const cell=document.createElement('div');
        cell.className=`cal-day${!c.cur?' other-month':''}${ds===td?' today':''}${ds===state.selectedDate?' selected':''}`;
        if(ds) cell.dataset.date=ds;
        const num=document.createElement('div'); num.className='day-num'; num.textContent=c.day; cell.appendChild(num);
        bks.slice(0,3).forEach(b=>{
          const ev=document.createElement('div');
          ev.className=`cal-event ${b.type==='Private Area'?'ev-private':'ev-table'}`;
          ev.textContent=`${b.type==='Private Area'?'Pvt':'Tbl'} · ${b.name.split(' ')[0]}`;
          ev.dataset.bookingId=b.id;
          ev.addEventListener('click',e=>{ e.stopPropagation(); openViewModal(b.id); });
          cell.appendChild(ev);
        });
        if(bks.length>3){ const m=document.createElement('div'); m.className='cal-more'; m.textContent=`+${bks.length-3} more`; cell.appendChild(m); }
        if(c.cur) cell.addEventListener('click',e=>{ if(e.target.dataset.bookingId) return; state.selectedDate=ds; openNewModal(ds); });
        cells.appendChild(cell);
      });
    }
    document.getElementById('prev-m').addEventListener('click',()=>{ state.month--; if(state.month<0){state.month=11;state.year--;} renderCalendar(); });
    document.getElementById('next-m').addEventListener('click',()=>{ state.month++; if(state.month>11){state.month=0;state.year++;} renderCalendar(); });

    // ── LIST ──
    function renderList(){
      const filter=document.getElementById('filter-type').value;
      let list=filter==='All'?[...state.bookings]:state.bookings.filter(b=>b.type===filter);
      const container=document.getElementById('list-container');
      if(!list.length){container.innerHTML='<div class="list-empty">No bookings found.</div>';return;}
      container.innerHTML='';
      const wrap=document.createElement('div'); wrap.className='list-container';
      list.forEach(b=>{
        const row=document.createElement('div'); row.className='list-row';
        row.innerHTML=`
          <div class="list-info">
            <div class="list-name">${esc(b.name)}</div>
            <div class="list-meta">${b.date} · ${b.fromTime}–${b.toTime} · ${b.guests} guests · ${esc(b.event)}</div>

          </div>

          <div style="display:flex;gap:6px;flex-shrink:0">
            <button class="btn-edit" data-edit="${b.id}">Edit</button>
            ${state.userRole==='admin'?`<button class="btn-del" data-del="${b.id}">Delete</button>`:''}
          </div>`;
        row.querySelector('[data-edit]')?.addEventListener('click',()=>openEditModal(b.id));
        row.querySelector('[data-del]')?.addEventListener('click',()=>deleteBooking(b.id,b.name));
        wrap.appendChild(row);
      });
      container.appendChild(wrap);
    }

    document.getElementById('new-btn').addEventListener('click',()=>openNewModal(todayStr()));

    // ── BOOKING MODALS ──
    function openNewModal(date=todayStr()){
      state.modalMode='new'; state.editBookingId=null;
      state.formData={date,type:'Table Booking',event:EVENT_TYPES[0],menuChoice:'A-la-carte',menuNote:'',decoration:false,fromTime:'',toTime:'',guests:'',advance:'',phone:'',notes:'',name:''};
      renderBookingModal();
    }
    function openEditModal(id){ const b=state.bookings.find(x=>x.id===id); if(!b) return; state.modalMode='edit'; state.editBookingId=id; state.formData={...b}; renderBookingModal(); }
    function openViewModal(id){ const b=state.bookings.find(x=>x.id===id); if(!b) return; state.modalMode='view'; state.editBookingId=id; state.formData={...b}; renderBookingModal(); }

    function renderBookingModal(){
      const {modalMode:mode,formData:f,userRole}=state;
      const isView=mode==='view', isNew=mode==='new', dis=isView?'disabled':'';
      const conflict=!isView&&checkConflict(f,isNew?null:state.editBookingId);
      const mc=f.menuChoice||'A-la-carte', dec=!!f.decoration;
      document.getElementById('modal-title').textContent={new:'New booking',edit:'Edit booking',view:'Booking details'}[mode];
      document.getElementById('modal-body').innerHTML=`
        ${conflict?`<div class="conflict-warn">&#9888; Private Area already booked for an overlapping time on this date.</div>`:''}
        <div class="sec">Guest info</div>
        <div class="field-row">
          <div><label class="fl">Guest name *</label><input id="f-name" value="${esc(f.name||'')}" placeholder="Full name" ${dis}></div>
          <div><label class="fl">Phone</label><input id="f-phone" value="${esc(f.phone||'')}" placeholder="+91 xxxxx xxxxx" ${dis}></div>
        </div>
        <div class="sec">Booking details</div>
        <div class="field-row">
          <div><label class="fl">Booking type *</label><select id="f-type" ${dis}>${BOOKING_TYPES.map(t=>`<option ${f.type===t?'selected':''}>${t}</option>`).join('')}</select></div>
          <div><label class="fl">Date *</label><input type="date" id="f-date" value="${f.date||''}" ${dis}></div>
        </div>
        <div class="field-row triple">
          <div><label class="fl">From time *</label><input type="time" id="f-from" value="${f.fromTime||''}" ${dis}></div>
          <div><label class="fl">To time *</label><input type="time" id="f-to" value="${f.toTime||''}" ${dis}></div>
          <div><label class="fl">No. of guests *</label><input type="number" id="f-guests" value="${f.guests||''}" min="1" max="300" ${dis}></div>
        </div>
        <div class="field-row">
          <div><label class="fl">Event type</label><select id="f-event" ${dis}>${EVENT_TYPES.map(e=>`<option ${f.event===e?'selected':''}>${e}</option>`).join('')}</select></div>
          <div><label class="fl">Advance amount (₹)</label><input type="number" id="f-advance" value="${f.advance||''}" placeholder="0" min="0" ${dis}></div>
        </div>
        <div class="sec">Menu preference</div>
        <label class="fl">Menu choice</label>
        <div class="toggle-group" style="max-width:240px;margin-bottom:4px">
          <button type="button" class="toggle-btn ${mc==='A-la-carte'?'on':''}" id="menu-alacarte" ${dis}>A-la-carte</button>
          <button type="button" class="toggle-btn ${mc==='Fixed'?'on':''}" id="menu-fixed" ${dis}>Fixed menu</button>
        </div>
        <div id="menu-note-wrap" style="display:${mc==='Fixed'?'block':'none'}">
          <div class="menu-note-box">
            <label class="fl" style="color:#C03A1A">Fixed menu details</label>
            <textarea id="f-menunote" rows="3" placeholder="Starters, mains, desserts, drinks…" ${dis}>${esc(f.menuNote||'')}</textarea>
          </div>
        </div>
        <div class="sec">Decoration</div>
        <label class="fl">Decoration required?</label>
        <div class="toggle-group" style="max-width:160px;margin-bottom:12px">
          <button type="button" class="toggle-btn ${dec?'on-yes':''}" id="dec-yes" ${dis}>Yes</button>
          <button type="button" class="toggle-btn ${!dec?'on-no':''}" id="dec-no" ${dis}>No</button>
        </div>
        <div class="sec">Additional notes</div>
        <div class="field-row single">
          <textarea id="f-notes" rows="2" placeholder="Special requests, seating, equipment…" ${dis}>${esc(f.notes||'')}</textarea>
        </div>
        <div class="modal-footer">
          ${isView
            ?`<button class="btn-ghost" id="m-close">Close</button>
              <button class="btn-coral" id="m-edit" style="padding:8px 20px">Edit</button>
              ${userRole==='admin'?`<button class="btn-del" id="m-del" style="padding:8px 20px">Delete</button>`:''}`
            :`<button class="btn-ghost" id="m-cancel">Cancel</button>
              <button class="btn-coral" id="m-save" style="padding:8px 22px" ${conflict?'disabled':''}>Save booking</button>`}
        </div>`;
      if(!isView){
        document.getElementById('menu-alacarte')?.addEventListener('click',()=>{ syncForm(); state.formData.menuChoice='A-la-carte'; renderBookingModal(); });
        document.getElementById('menu-fixed')?.addEventListener('click',()=>{ syncForm(); state.formData.menuChoice='Fixed'; renderBookingModal(); });
        document.getElementById('dec-yes')?.addEventListener('click',()=>{ syncForm(); state.formData.decoration=true; renderBookingModal(); });
        document.getElementById('dec-no')?.addEventListener('click',()=>{ syncForm(); state.formData.decoration=false; renderBookingModal(); });
        ['f-type','f-date','f-from','f-to'].forEach(id=>document.getElementById(id)?.addEventListener('change',()=>{ syncForm(); renderBookingModal(); }));
        document.getElementById('m-save')?.addEventListener('click',saveBooking);

    function syncForm(){
      const gv=id=>{ const el=document.getElementById(id); return el?el.value.trim():''; };
      state.formData={...state.formData,name:gv('f-name'),phone:gv('f-phone'),type:gv('f-type'),date:gv('f-date'),fromTime:gv('f-from'),toTime:gv('f-to'),guests:gv('f-guests'),event:gv('f-event'),advance:gv('f-advance'),menuNote:gv('f-menunote'),notes:gv('f-notes')};
    }

    function closeModal(){ document.getElementById('modal-overlay').style.display='none'; state.modalMode=null; state.formData={}; }
    document.getElementById('modal-close').addEventListener('click',closeModal);
    document.getElementById('modal-overlay').addEventListener('click',e=>{ if(e.target===document.getElementById('modal-overlay')) closeModal(); });

    async function saveBooking(){
      syncForm(); const f=state.formData;
      if(!f.name){alert('Guest name is required');return;}
      if(!f.date){alert('Date is required');return;}
      if(!f.fromTime){alert('From time is required');return;}
      if(!f.toTime){alert('To time is required');return;}
      if(!f.guests){alert('Number of guests is required');return;}
      if(f.fromTime>=f.toTime){alert('To time must be after From time');return;}
      if(checkConflict(f,state.modalMode==='new'?null:state.editBookingId)){alert('Private Area is already booked for this time.');return;}
      const btn=document.getElementById('m-save');
      btn.innerHTML='<span class="spinner"></span>Saving…'; btn.disabled=true;
      const data={name:f.name,phone:f.phone||'',type:f.type,date:f.date,fromTime:f.fromTime,toTime:f.toTime,guests:parseInt(f.guests)||1,event:f.event,advance:f.advance||'0',menuChoice:f.menuChoice,menuNote:f.menuNote||'',decoration:!!f.decoration,notes:f.notes||'',updatedAt:new Date().toISOString(),updatedBy:state.user.email};
      try{
        if(state.modalMode==='new'){data.createdAt=new Date().toISOString();data.createdBy=state.user.email;await addDoc(collection(db,'bookings'),data);showToast('Booking created!');}
        else{await updateDoc(doc(db,'bookings',state.editBookingId),data);showToast('Booking updated!');}
        closeModal();
      }catch(e){console.error(e);alert('Error saving. Please try again.');btn.textContent='Save booking';btn.disabled=false;}
    }

    async function deleteBooking(id,name){
      if(!confirm(`Delete booking for "${name}"? This cannot be undone.`)) return;
      try{await deleteDoc(doc(db,'bookings',id));closeModal();showToast('Booking deleted.');}
      catch(e){console.error(e);alert('Error deleting.');}
    }

      document.getElementById('modal-body').innerHTML=`

        <div class="field-row">
          <div><label class="fl">Email *</label><input id="nu-email" type="email" placeholder="staff@gossip.com"></div>
          <div><label class="fl">Password *</label><input id="nu-pass" type="password" placeholder="Min 6 characters"></div>
        </div>
        <div class="field-row">
          <div><label class="fl">Display name</label><input id="nu-name" placeholder="e.g. Rahul"></div>

            <select id="nu-role">
              <option value="manager">Manager</option>
              <option value="staff">Staff</option>
            </select>
          </div>
        </div>
        <div id="nu-error" class="error-msg" style="display:none"></div>
        <div id="nu-success" class="success-msg" style="display:none"></div>
        <button class="btn-green" id="nu-create-btn" style="padding:8px 20px">Create user</button>

        <div class="sec" style="margin-top:20px">Current users</div>
        <table class="user-table">
          <thead><tr><th>Name / Email</th><th>Role</th><th>Change role</th></tr></thead>
          <tbody id="users-tbody"></tbody>
        </table>
        <div class="modal-footer">
          <button class="btn-ghost" id="m-close-users">Close</button>
        </div>`;
      renderUsersTable();
      document.getElementById('m-close-users').addEventListener('click',closeModal);
      document.getElementById('nu-create-btn').addEventListener('click',createUser);
      document.getElementById('modal-overlay').style.display='flex';
    }

    function renderUsersTable(){
      const tbody=document.getElementById('users-tbody');
      if(!tbody) return;
      if(!state.users.length){tbody.innerHTML='<tr><td colspan="3" style="text-align:center;color:#bbb;padding:16px">No users found</td></tr>';return;}
      tbody.innerHTML=state.users.map(u=>`
        <tr>
          <td>
            <div style="font-weight:600;font-size:13px">${esc(u.displayName||'—')}</div>
            <div style="font-size:11px;color:#888">${esc(u.email||u.id)}</div>
          </td>
          <td><span class="badge badge-${u.role||'staff'}">${ROLES[u.role]||u.role||'Staff'}</span></td>
          <td>
            ${u.id!==state.user?.uid
              ?`<select class="role-sel" data-uid="${u.id}" style="width:auto;font-size:12px;padding:4px 8px">
                  <option value="admin"   ${u.role==='admin'  ?'selected':''}>Admin</option>
                  <option value="manager" ${u.role==='manager'?'selected':''}>Manager</option>
                  <option value="staff"   ${u.role==='staff'  ?'selected':''}>Staff</option>
                </select>`
              :'<span style="font-size:11px;color:#aaa">You</span>'}
          </td>
        </tr>`).join('');
      tbody.querySelectorAll('.role-sel').forEach(sel=>{
        sel.addEventListener('change',async()=>{
          await setDoc(doc(db,'users',sel.dataset.uid),{role:sel.value},{merge:true});
          showToast('Role updated!');
        });
      });
    }

    async function createUser(){
      const email=document.getElementById('nu-email').value.trim();
      const pass=document.getElementById('nu-pass').value;
      const name=document.getElementById('nu-name').value.trim();
      const role=document.getElementById('nu-role').value;
      const errEl=document.getElementById('nu-error');
      const sucEl=document.getElementById('nu-success');
      const btn=document.getElementById('nu-create-btn');
      errEl.style.display='none'; sucEl.style.display='none';
      if(!email||!pass){errEl.textContent='Email and password are required.';errEl.style.display='block';return;}
      if(pass.length<6){errEl.textContent='Password must be at least 6 characters.';errEl.style.display='block';return;}
      btn.innerHTML='<span class="spinner"></span>Creating…'; btn.disabled=true;
      try{
        const cred=await createUserWithEmailAndPassword(auth,email,pass);
        await setDoc(doc(db,'users',cred.user.uid),{email,displayName:name||email.split('@')[0],role,createdAt:new Date().toISOString(),createdBy:state.user.email});
        document.getElementById('nu-email').value='';
        document.getElementById('nu-pass').value='';
        document.getElementById('nu-name').value='';
        sucEl.textContent=`✓ ${email} created as ${ROLES[role]}.`;
        sucEl.style.display='block';
        showToast('User created!');
      }catch(e){
        const msgs={'auth/email-already-in-use':'This email is already registered.','auth/invalid-email':'Enter a valid email.','auth/weak-password':'Password must be at least 6 characters.'};
        errEl.textContent=msgs[e.code]||'Error creating user. Please try again.';
        errEl.style.display='block';
      }
      btn.textContent='Create user'; btn.disabled=false;
    }

    // ── ALSO update Firestore rules to allow notes collection ──
    // Add to firestore.rules: match /notes/{n} { allow read,write: if request.auth != null; }
  </script>

  <!-- PWA: Service Worker + Notifications -->
  <script>
    const NOTIF_MINUTES = 30; // fire notification this many minutes before booking
    let swRegistration = null;
    const scheduledNotifs = new Set();

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/gossipbookings/sw.js', { scope: '/gossipbookings/' }).then(reg => {
        swRegistration = reg;
        console.log('SW registered');
      }).catch(err => console.warn('SW registration failed:', err));
    }

    // Request notification permission after login
    function requestNotifPermission() {
      if (!('Notification' in window)) return;
      if (Notification.permission === 'default') {
        Notification.requestPermission().then(perm => {
          if (perm === 'granted') showToast('Notifications enabled ✓');
        });
      }
    }

    // Schedule notifications for all upcoming bookings today & tomorrow
    function scheduleAllNotifications(bookings) {
      if (!swRegistration || Notification.permission !== 'granted') return;
      const now = new Date();

      bookings.forEach(b => {
        if (!b.date || !b.fromTime) return;
        const [year, month, day] = b.date.split('-').map(Number);
        const [hour, min] = b.fromTime.split(':').map(Number);
        const bookingTime = new Date(year, month - 1, day, hour, min);
        const notifTime = new Date(bookingTime.getTime() - NOTIF_MINUTES * 60 * 1000);
        const delay = notifTime.getTime() - now.getTime();

        // Only schedule if it's in the future and within next 24 hours
        // and we haven't already scheduled this one
        const key = `${b.id}-${b.fromTime}`;
        if (delay > 0 && delay < 24 * 60 * 60 * 1000 && !scheduledNotifs.has(key)) {
          scheduledNotifs.add(key);
          swRegistration.active?.postMessage({
            type: 'SCHEDULE_NOTIFICATION',
            booking: { ...b, icon: '/gossipbookings/icon-192.png' },
            delay: delay
          });
        }
      });
    }

    // Cancel notification for a deleted booking
    function cancelNotification(bookingId) {
      if (!swRegistration) return;
      swRegistration.active?.postMessage({
        type: 'CANCEL_NOTIFICATION',
        bookingId: bookingId
      });
    }

    // Hook into auth state — request permission once logged in
    // and re-schedule whenever bookings change
    const _origOnAuth = window._onAuthReady;
    document.addEventListener('gossip:authed', () => {
      setTimeout(requestNotifPermission, 2000);
    });
    document.addEventListener('gossip:bookings-updated', e => {
      scheduleAllNotifications(e.detail || []);
    });
  </script>
